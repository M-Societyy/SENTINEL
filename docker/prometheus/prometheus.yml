# sentinel - prometheus config
# m-society & c1q_

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sentinel-core"
    static_configs:
      - targets: ["core:8000"]
    metrics_path: "/api/v1/metrics"

  - job_name: "sentinel-crawler"
    static_configs:
      - targets: ["crawler:50051"]
