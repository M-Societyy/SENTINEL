# sentinel - kubernetes deployment
# c1q_ (M-Society team)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-core
  namespace: sentinel
  labels:
    app: sentinel
    component: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel
      component: core
  template:
    metadata:
      labels:
        app: sentinel
        component: core
    spec:
      containers:
        - name: core
          image: sentinel/core:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinel-secrets
            - configMapRef:
                name: sentinel-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-core-svc
  namespace: sentinel
spec:
  selector:
    app: sentinel
    component: core
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-frontend
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel
      component: frontend
  template:
    metadata:
      labels:
        app: sentinel
        component: frontend
    spec:
      containers:
        - name: frontend
          image: sentinel/frontend:1.0.0
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-frontend-svc
  namespace: sentinel
spec:
  selector:
    app: sentinel
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-ingress
  namespace: sentinel
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: sentinel.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sentinel-core-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-frontend-svc
                port:
                  number: 3000
