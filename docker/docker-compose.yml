# sentinel - plataforma osint by c1q_ (M-Society team)
# docker compose para desarrollo local

version: "3.9"

services:
  # --- base de datos principal ---
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net

  # --- cache, colas, sesiones ---
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-sentinel_redis_2024}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sentinel_redis_2024}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net

  # --- busqueda full-text ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sentinel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - sentinel-net

  # --- grafo de relaciones ---
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sentinel_neo4j_2024}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-sentinel_neo4j_2024} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - sentinel-net

  # --- backend python ---
  core:
    build:
      context: ../
      dockerfile: sentinel/core/Dockerfile
    container_name: sentinel-core
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:${POSTGRES_PASSWORD:-sentinel_dev_2024}@postgres:5432/sentinel
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sentinel_redis_2024}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-sentinel_neo4j_2024}
      - SECRET_KEY=${SECRET_KEY:-sentinel_secret_key_cambiar_en_produccion}
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ../sentinel/core:/app
    networks:
      - sentinel-net

  # --- worker celery ---
  celery-worker:
    build:
      context: ../
      dockerfile: sentinel/core/Dockerfile
    container_name: sentinel-celery-worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:${POSTGRES_PASSWORD:-sentinel_dev_2024}@postgres:5432/sentinel
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sentinel_redis_2024}@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-sentinel_neo4j_2024}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../sentinel/core:/app
    networks:
      - sentinel-net

  # --- celery beat scheduler ---
  celery-beat:
    build:
      context: ../
      dockerfile: sentinel/core/Dockerfile
    container_name: sentinel-celery-beat
    command: celery -A tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel:${POSTGRES_PASSWORD:-sentinel_dev_2024}@postgres:5432/sentinel
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sentinel_redis_2024}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../sentinel/core:/app
    networks:
      - sentinel-net

  # --- crawler go ---
  crawler:
    build:
      context: ../sentinel/crawler
      dockerfile: Dockerfile
    container_name: sentinel-crawler
    environment:
      - GRPC_PORT=50051
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sentinel_redis_2024}@redis:6379/1
    ports:
      - "50051:50051"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentinel-net

  # --- frontend react ---
  frontend:
    build:
      context: ../sentinel/frontend
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - core
    networks:
      - sentinel-net

  # --- reverse proxy ---
  nginx:
    image: nginx:alpine
    container_name: sentinel-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core
      - frontend
    networks:
      - sentinel-net

  # --- metricas ---
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sentinel-net

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sentinel_grafana_2024}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sentinel-net

volumes:
  postgres_data:
  redis_data:
  elastic_data:
  neo4j_data:
  prometheus_data:
  grafana_data:

networks:
  sentinel-net:
    driver: bridge
